    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);line-height:1.55} .wrap{width:min(760px,100%);margin:0 auto;padding:16px}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.result{margin-top:14px;background:#fff;color:#132033;border-radius:8px;padding:14px;display:grid;gap:8px}.std{font-size:34px;font-weight:950}.pill{display:inline-flex;padding:4px 10px;border-radius:999px;font-weight:950}.ok{background:#e7f8ef;color:#087143}.no{background:#fff4e9;color:#ad4e1f}

    const $=id=>document.getElementById(id);
    function normalizeTimeInput(t){let s=String(t||"").normalize("NFKC").trim().replace(/[，、]/g,".").replace(/\s+/g,"");const m=s.match(/^(\d+)\.(\d{2})\.(\d{1,2})$/);if(m)s=m[1]+":"+m[2]+"."+m[3];return s}
    function toSec(t){const s=normalizeTimeInput(t);if(!s)return NaN;if(s.includes(":")){const [m,sec]=s.split(":").map(Number);return Number.isFinite(m)&&Number.isFinite(sec)&&sec>=0&&sec<60?m*60+sec:NaN}const n=Number(s);return Number.isFinite(n)&&n>0?n:NaN}
    function fmt(sec){if(!Number.isFinite(sec))return "-";const sign=sec<0?"-":"";sec=Math.abs(sec);const m=Math.floor(sec/60),s=sec-m*60;return sign+(m?m+":"+s.toFixed(2).padStart(5,"0"):s.toFixed(2))}
    function setup(){ $("stroke").innerHTML=STROKES.map(([k,v])=>'<option value="'+k+'">'+v+'</option>').join(""); ["gender","stroke"].forEach(id=>$(id).addEventListener("change",()=>{fillDistances();render()})); ["distance","time"].forEach(id=>$(id).addEventListener("input",render)); $("sample").onclick=()=>{$("gender").value="male";$("stroke").value="fr";fillDistances();$("distance").value="100";$("time").value="55.14";render()}; fillDistances(); render(); }
    function fillDistances(){const ds=[...new Set(ENTRIES.filter(e=>e.gender===$("gender").value&&e.stroke===$("stroke").value).map(e=>e.distance))].sort((a,b)=>a-b);$("distance").innerHTML=ds.map(d=>'<option value="'+d+'">'+d+'m</option>').join("")}
    function render(){const e=ENTRIES.find(x=>x.gender===$("gender").value&&x.stroke===$("stroke").value&&x.distance===Number($("distance").value));const sec=toSec($("time").value);if(!e){$("result").innerHTML="該当標準がありません。";return}const diff=sec-toSec(e.standard);const status=Number.isFinite(diff)?(diff<=0?"突破":"あと "+fmt(diff)):"タイム未入力";$("result").innerHTML='<div>標準記録</div><div class="std">'+e.standard+'</div><span class="pill '+(diff<=0?"ok":"no")+'">'+status+'</span><div>'+(Number.isFinite(diff)?(diff<=0?fmt(-diff)+" 速い":fmt(diff)+" 足りない"):"タイムを入力してください")+'</div>'}
    setup();
